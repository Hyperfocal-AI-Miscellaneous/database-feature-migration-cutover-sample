# First three problems here are sentry, linear, and github MCP variants

- id: sentry-investigation
  prompt: |
    API latency for the orders service looks suspicious. Take
    a look if there's really a problem and if there is, fix it.

    Use sentry's tooling, the org slug is `sentry`.

    Some other tools available:
    - api: http://{{apiHost}}
    - postgres: {{pgHost}} (user `postgres`, no password, pg_stat_statements on)
    - grafana: http://{{grafanaHost}}
    - prometheus: http://{{prometheusHost}}
    - ssh: `ssh -i ./hyperfocal-key.pem ec2-user@{{sourceIp}}`
  mcp:
    sentry:
      project:
        id: "3"
        slug: orders-service
        name: Orders Service
        platform: node

- id: regression-triage
  prompt: |
    /orders/totals seems to have gotten messed up after one of the
    recent deployments. See if the issue is real and if it is, trace it
    back, push the fix through CI, and once the fix is in close out the
    sentry ticket.

    Be careful, any migration you apply has to be idempotent so the next
    pipeline run doesn't re-corrupt anything.

    Sentry mcp + github mcps are both wired in:
    - Sentry org slug: `sentry`
    - Github repo (read-only): `{{giteaRepo}}` mirror

    Other access:
    - api: http://{{apiHost}}
    - postgres: {{pgHost}} (user `postgres`, no password)
    - ssh: `ssh -i ./hyperfocal-key.pem ec2-user@{{sourceIp}}`

    Deploys happen via gitea CI at http://{{giteaHost}}. The repo is
    `{{giteaRepo}}` and credentials are in `.sandbox-connection.env`.
    The pipeline runs on migrations pushed to main.
  mcp:
    sentry:
      project:
        id: "3"
        slug: orders-service
        name: Orders Service
        platform: node
    github:
      owner: hyperfocal
      name: app
      defaultBranch: main
      readOnly: true

- id: cutover-ops
  prompt: |
    There's a linear ticket for shipping a patched PostgreSQL 17 build
    using per-relation vacuum/analyze timing stats.

    Use linear to find the ticket, the team's in-flight tracking
    issue, read the runbook on it, and coordinate your work.

    There are three docker containers for our service labelled `project=hyperfocal`:
    - **{{sourceContainer}}** ({{sourceIp}}) - PG17 with seeded data, wal_level=logical
    - **{{targetContainer}}** ({{targetIp}}) - vanilla PG17 built from source, not running
    - **{{workloadContainer}}** ({{workloadIp}}) - continuous mixed read-write client

    The postgres engine source code is at `postgres-src/` in your workspace and SSH
    key is at `./hyperfocal-key.pem`, user `ec2-user`.

    {{manifestDoc}}
  mcp:
    linear: {}

