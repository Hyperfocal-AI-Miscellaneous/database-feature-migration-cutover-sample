[databases]
postgres = host=172.20.0.10 port=5432 dbname=postgres

[pgbouncer]
listen_addr = *
listen_port = 5432
; Started as root to bind :5432, then drops to the 'postgres' user
user = postgres
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = session
max_client_conn = 200
default_pool_size = 20
server_reset_query = DISCARD ALL
admin_users = pgbouncer
stats_users = pgbouncer
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid
